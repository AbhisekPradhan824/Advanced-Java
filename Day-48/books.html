<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java Books Selection</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 350px;
        }

        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
            border-bottom: 2px solid #3498db;
            display: inline-block;
            width: 100%;
            padding-bottom: 10px;
        }

        .checkbox-group {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            cursor: pointer;
            padding: 8px;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .checkbox-group:hover {
            background-color: #f7f9fc;
        }

        input[type="checkbox"] {
            margin-right: 12px;
            transform: scale(1.2);
            cursor: pointer;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        input[type="submit"], input[type="reset"] {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        input[type="submit"] {
            background-color: #3498db;
            color: white;
        }

        input[type="reset"] {
            background-color: #e74c3c;
            color: white;
        }

        input:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Java Books</h1>
    <form action="set">
        <label class="checkbox-group">
            <input type="checkbox" name="book1" value="HeadFirstJava"> Head First Java
        </label>
        
        <label class="checkbox-group">
            <input type="checkbox" name="book2" value="Java2CompleteReference"> Java 2: Complete Reference
        </label>
        
        <label class="checkbox-group">
            <input type="checkbox" name="book3" value="SCJPByKathySierra"> SCJP By Kathy Sierra
        </label>

        <div class="button-group">
            <input type="submit" value="Submit">
            <input type="reset" value="Clear">
        </div>
    </form>
</div>

</body>
</html>
